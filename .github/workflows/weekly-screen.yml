name: 每週重篩守備清單（市值+成長+籌碼）

on:
  schedule:
    - cron: '0 12 * * 0'    # UTC 12:00 週日 = 台灣 20:00 週日
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 裝套件
        run: pip install yfinance requests

      - name: 重篩（每鏈 top N）
        run: python screen.py

      - name: 推播「本週守備清單已更新」
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import json, os, requests
          d = json.load(open("screen_result.json", encoding="utf-8"))
          us = sorted({x["code"] for l in d["us"].values() for x in l})
          tw = sorted({x["code"] for l in d["tw"].values() for x in l})
          lines = [f"📋 <b>本週守備清單已重篩</b>（每週日）",
                   f"美股 {len(us)} 檔、台股 {len(tw)} 檔",
                   f"<i>依 市值＋成長＋籌碼 三因子，每鏈取最強。週二起的盤後警示將用新清單。</i>"]
          requests.post(f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
                        json={"chat_id": os.environ["TELEGRAM_CHAT_ID"], "text": "\n".join(lines),
                              "parse_mode": "HTML"}, timeout=30)
          print("notified", len(us), len(tw))
          PY

      - name: 買進機會週報（巴菲特到價 + 雙確認）
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python buy_digest.py || echo "買進機會週報失敗，跳過"

      - name: 產巴菲特價值清單頁（docs/buffett.html）
        run: python buffett_html.py -o docs/buffett.html || echo "巴菲特頁失敗，跳過"

      - name: 模擬倉每週調倉（跟新清單）+ 出賽馬頁
        run: |
          python paper_portfolio.py rebalance || echo "調倉失敗，跳過"
          python portfolio_html.py -o docs/portfolios.html || echo "賽馬頁失敗，跳過"

      - name: commit 新清單 + 巴菲特頁 + 模擬倉
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screen_result.json docs/buffett.html portfolios.json docs/portfolios.html
          git commit -m "chore: weekly re-screen + 巴菲特頁 + 模擬倉調倉 [skip ci]" || echo "無變化"
          git push || echo "push 略過"
